name: Test ONNX Runtime GGML EP

on:
  push:
    paths:
      - ".github/workflows/test-onnxruntime-ggml-ep.yml"
      - "docs/ggml-onnx-plugin-provider.md"
      - "docs/ggml-vulkan-backend-stages.md"
      - "experimental/onnxruntime-ep-aivis-ggml/**"
      - "test/integration/test_onnxruntime_ep_aivis_ggml.py"
      - "test/unit/test_onnxruntime_ep_aivis_ggml_*.py"
      - "test/unit/tts_pipeline/test_style_bert_vits2_tts_engine.py"
      - "test/unit/test_benchmark_style_bert_vits2_ggml_vulkan.py"
  pull_request:
    paths:
      - ".github/workflows/test-onnxruntime-ggml-ep.yml"
      - "docs/ggml-onnx-plugin-provider.md"
      - "docs/ggml-vulkan-backend-stages.md"
      - "experimental/onnxruntime-ep-aivis-ggml/**"
      - "test/integration/test_onnxruntime_ep_aivis_ggml.py"
      - "test/unit/test_onnxruntime_ep_aivis_ggml_*.py"
      - "test/unit/tts_pipeline/test_style_bert_vits2_tts_engine.py"
      - "test/unit/test_benchmark_style_bert_vits2_ggml_vulkan.py"
  workflow_dispatch:
    inputs:
      artifact_bundle_url:
        description: "Optional .tar.gz/.tgz/.zip bundle for real-artifact EPContext and compiler tests."
        required: false
      artifact_bundle_sha256:
        description: "Optional SHA-256 for artifact_bundle_url."
        required: false
  schedule:
    - cron: "17 3 * * 1"

defaults:
  run:
    shell: bash

env:
  ORT_VERSION: "1.26.0"
  ORT_RELEASE_BASENAME: "onnxruntime-linux-x64-1.26.0"

jobs:
  plugin-ep:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: <Setup> Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: <Setup> Prepare Python Runtime / Python Dependencies
        uses: ./.github/actions/prepare_python
        with:
          dependency-group: dev

      - name: <Test> Check Plugin EP Python sources
        run: |
          PYTHONUTF8=1 uv run ruff check \
            experimental/onnxruntime-ep-aivis-ggml/src \
            experimental/onnxruntime-ep-aivis-ggml/tools \
            test/unit/test_onnxruntime_ep_aivis_ggml_cache.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_jp_bert_gguf_writer.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_package.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_signature.py

      - name: <Test> Run Plugin EP unit and default integration tests
        run: |
          uv run pytest \
            test/integration/test_onnxruntime_ep_aivis_ggml.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_cache.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_jp_bert_gguf_writer.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_package.py \
            test/unit/test_onnxruntime_ep_aivis_ggml_signature.py \
            test/unit/tts_pipeline/test_style_bert_vits2_tts_engine.py \
            test/unit/test_benchmark_style_bert_vits2_ggml_vulkan.py \
            -q

      - name: <Setup> Download ONNX Runtime public headers
        run: |
          mkdir -p build/ort
          curl -fL --retry 3 --retry-delay 5 \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_RELEASE_BASENAME}.tgz" \
            -o build/ort/onnxruntime.tgz
          tar -xzf build/ort/onnxruntime.tgz -C build/ort

      - name: <Build> Build native Plugin EP
        run: |
          cmake \
            -S experimental/onnxruntime-ep-aivis-ggml/native \
            -B build/aivis-ggml-onnx-ep \
            -DORT_INCLUDE_DIR="${PWD}/build/ort/${ORT_RELEASE_BASENAME}/include/onnxruntime/core/session"
          cmake --build build/aivis-ggml-onnx-ep -j2

      - name: <Test> Smoke-register native Plugin EP
        run: |
          PYTHONPATH=experimental/onnxruntime-ep-aivis-ggml/src \
          uv run python experimental/onnxruntime-ep-aivis-ggml/tools/smoke_register_plugin.py \
            build/aivis-ggml-onnx-ep/libaivis_ggml_onnx_ep.so \
            --session-smoke \
            --provider-option backend=cpu \
            --provider-option precision=accurate

      - name: <Setup> Resolve real-artifact bundle input
        id: real-artifacts
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          INPUT_ARTIFACT_BUNDLE_URL: ${{ inputs.artifact_bundle_url }}
          INPUT_ARTIFACT_BUNDLE_SHA256: ${{ inputs.artifact_bundle_sha256 }}
          SECRET_ARTIFACT_BUNDLE_URL: ${{ secrets.AIVIS_GGML_ONNX_EP_ARTIFACT_BUNDLE_URL }}
          SECRET_ARTIFACT_BUNDLE_SHA256: ${{ secrets.AIVIS_GGML_ONNX_EP_ARTIFACT_BUNDLE_SHA256 }}
        run: |
          bundle_url="${INPUT_ARTIFACT_BUNDLE_URL:-$SECRET_ARTIFACT_BUNDLE_URL}"
          bundle_sha256="${INPUT_ARTIFACT_BUNDLE_SHA256:-$SECRET_ARTIFACT_BUNDLE_SHA256}"
          if [[ -z "$bundle_url" ]]; then
            echo "has_bundle=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "ARTIFACT_BUNDLE_URL=${bundle_url}"
            echo "ARTIFACT_BUNDLE_SHA256=${bundle_sha256}"
          } > "${RUNNER_TEMP}/aivis-ggml-onnx-ep-artifact-bundle.env"
          echo "has_bundle=true" >> "$GITHUB_OUTPUT"

      - name: <Setup> Download real-artifact bundle
        if: steps.real-artifacts.outputs.has_bundle == 'true'
        run: |
          source "${RUNNER_TEMP}/aivis-ggml-onnx-ep-artifact-bundle.env"
          mkdir -p build/real-artifacts
          curl -fL --retry 3 --retry-delay 5 "$ARTIFACT_BUNDLE_URL" -o build/real-artifacts/bundle
          if [[ -n "$ARTIFACT_BUNDLE_SHA256" ]]; then
            echo "${ARTIFACT_BUNDLE_SHA256}  build/real-artifacts/bundle" | sha256sum -c -
          fi
          if file build/real-artifacts/bundle | grep -qi 'Zip archive'; then
            unzip -q build/real-artifacts/bundle -d build/real-artifacts
          else
            tar -xf build/real-artifacts/bundle -C build/real-artifacts
          fi
          find build/real-artifacts -maxdepth 3 -type f | sort

      - name: <Test> Run real-artifact compiler and EPContext matrix
        if: steps.real-artifacts.outputs.has_bundle == 'true'
        env:
          AIVIS_GGML_ONNX_EP_LIBRARY_PATH: ${{ github.workspace }}/build/aivis-ggml-onnx-ep/libaivis_ggml_onnx_ep.so
          AIVIS_GGML_ONNX_EP_TTS_CPP_LIBRARY_PATH: ${{ github.workspace }}/build/real-artifacts/lib/libtts.so
          AIVIS_GGML_ONNX_EP_SYNTHESIS_ONNX_PATH: ${{ github.workspace }}/build/real-artifacts/synthesis/model.aivmx
          AIVIS_GGML_ONNX_EP_SYNTHESIS_GGUF_PATH: ${{ github.workspace }}/build/real-artifacts/synthesis/model.gguf
          AIVIS_GGML_ONNX_EP_SYNTHESIS_CONFIG_PATH: ${{ github.workspace }}/build/real-artifacts/synthesis/config.json
          AIVIS_GGML_ONNX_EP_STYLE_VECTORS_PATH: ${{ github.workspace }}/build/real-artifacts/synthesis/style_vectors.npy
          AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH: ${{ github.workspace }}/build/real-artifacts/jp_bert/model.onnx
          AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH: ${{ github.workspace }}/build/real-artifacts/jp_bert/model.gguf
        run: |
          required_paths=(
            "$AIVIS_GGML_ONNX_EP_LIBRARY_PATH"
            "$AIVIS_GGML_ONNX_EP_TTS_CPP_LIBRARY_PATH"
            "$AIVIS_GGML_ONNX_EP_SYNTHESIS_ONNX_PATH"
            "$AIVIS_GGML_ONNX_EP_SYNTHESIS_GGUF_PATH"
            "$AIVIS_GGML_ONNX_EP_SYNTHESIS_CONFIG_PATH"
            "$AIVIS_GGML_ONNX_EP_STYLE_VECTORS_PATH"
          )
          for path in "${required_paths[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "::error::Missing real-artifact fixture file: $path"
              exit 1
            fi
          done

          cache_dir="${RUNNER_TEMP}/aivis-ggml-onnx-ep-cache"
          PYTHONPATH=experimental/onnxruntime-ep-aivis-ggml/src \
          uv run --with gguf python experimental/onnxruntime-ep-aivis-ggml/tools/compile_cache.py \
            "$AIVIS_GGML_ONNX_EP_SYNTHESIS_ONNX_PATH" \
            --cache-dir "$cache_dir" \
            --config-path "$AIVIS_GGML_ONNX_EP_SYNTHESIS_CONFIG_PATH" \
            --style-vectors-path "$AIVIS_GGML_ONNX_EP_STYLE_VECTORS_PATH" \
            --backend cpu \
            --precision accurate \
            --converter-version "${GITHUB_SHA}"

          if [[ ! -f "$AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH" && -f "$AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH" ]]; then
            PYTHONPATH=experimental/onnxruntime-ep-aivis-ggml/src \
            uv run --with gguf python experimental/onnxruntime-ep-aivis-ggml/tools/compile_jp_bert.py \
              --onnx-path "$AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH" \
              --save-path "$AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH" \
              --backend cpu \
              --precision accurate \
              --converter-version "${GITHUB_SHA}"
          fi

          if [[ -f "$AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH" ]]; then
            AIVIS_GGML_ONNX_EP_JP_BERT_CONVERT_TEST=1 \
            uv run --with gguf pytest \
              test/integration/test_onnxruntime_ep_aivis_ggml.py::test_aivis_ggml_onnx_ep_writes_real_jp_bert_gguf \
              -q
          fi

          if [[ -f "$AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH" && -f "$AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH" ]]; then
            AIVIS_GGML_ONNX_EP_JP_BERT_PARITY_TEST=1 \
            uv run pytest \
              test/integration/test_onnxruntime_ep_aivis_ggml.py::test_aivis_ggml_onnx_ep_jp_bert_matches_onnx_cpu_features \
              -q
          fi

          export AIVIS_GGML_ONNX_EP_TEST=1
          if [[ ! -f "$AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH" || ! -f "$AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH" ]]; then
            unset AIVIS_GGML_ONNX_EP_JP_BERT_ONNX_PATH
            unset AIVIS_GGML_ONNX_EP_JP_BERT_GGUF_PATH
          fi
          uv run pytest \
            test/integration/test_onnxruntime_ep_aivis_ggml.py::test_aivis_ggml_onnx_ep_compiles_and_loads_ep_context_round_trip \
            -q
