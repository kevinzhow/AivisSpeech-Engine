name: Build
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "バージョン情報 (A.BB.C / A.BB.C-preview.D)"
        required: true
      prerelease:
        description: "プレリリースかどうか"
        type: boolean
        default: true
      code_signing:
        description: "コード署名する"
        type: boolean
        default: false
      upload_artifact:
        description: "デバッグ用に成果物を artifact にアップロードするか"
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:
  config: # 全 jobs で利用する定数の定義. `env` が利用できないコンテキストでも利用できる.
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      version_or_latest: ${{ steps.vars.outputs.version_or_latest }}
    steps:
      - name: <Setup> Declare variables
        id: vars
        run: |
          : # workflow_dispatch でのバージョン名. リリースでない (push event) 場合は空文字列
          echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          : # workflow_dispatch でのバージョン名, または 'latest'
          echo "version_or_latest=${{ github.event.inputs.version || 'latest' }}" >> "$GITHUB_OUTPUT"

  build-and-upload:
    needs: [config]
    environment: ${{ github.event.inputs.code_signing == 'true' && 'code_signing' || '' }} # コード署名用のenvironment
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-2022
            target: Windows-x64
          # macOS x64 (Intel Mac)
          - os: macos-15-intel
            target: macOS-x64
          # macOS arm64 (Apple Silicon Mac)
          - os: macos-14
            target: macOS-arm64
          # Linux x64
          - os: ubuntu-22.04
            target: Linux-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    env:
      # GNUコマンド
      sed: ${{ startsWith(matrix.os, 'macos-') && 'gsed' || 'sed' }}
      split: ${{ startsWith(matrix.os, 'macos-') && 'gsplit' || 'split' }}
      AIVIS_ONNX_GGML_ORT_VERSION: "1.26.0"
      AIVIS_ONNX_GGML_TTS_CPP_REPOSITORY: "https://github.com/clawd20130/TTS.cpp.git"
      AIVIS_ONNX_GGML_TTS_CPP_REF: "0c6678415023c44d52dcf322827c33d36a352cb2"
      VULKAN_SDK_VERSION: "1.3.296.0"

    steps:
      - name: <Setup> Declare variables
        id: vars
        run: echo "package_name=AivisSpeech-Engine-${{ matrix.target }}-${{ needs.config.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: <Setup> Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # NOTE: The default 'sed' and 'split' of macOS is BSD 'sed' and 'split'.
      #       There is a difference in specification between BSD 'sed' and 'split' and GNU 'sed' and 'split',
      #       so you need to install GNU 'sed' and 'split'.
      - name: <Setup> Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gnu-sed coreutils

      - name: <Setup> Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: <Setup> Prepare Python Runtime / Python Dependencies
        uses: ./.github/actions/prepare_python
        with:
          dependency-group: build

      - name: <Setup> Install ONNX GGML native build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev patchelf xz-utils

          VULKAN_SDK_ARCHIVE="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          VULKAN_SDK_DIR="${{ runner.temp }}/vulkan-sdk"
          mkdir -p download/ "${VULKAN_SDK_DIR}"
          curl -sSL \
            "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${VULKAN_SDK_ARCHIVE}" \
            -o "download/${VULKAN_SDK_ARCHIVE}"
          tar -xf "download/${VULKAN_SDK_ARCHIVE}" -C "${VULKAN_SDK_DIR}"
          GLSLC_PATH="$(find "${VULKAN_SDK_DIR}" -path '*/bin/glslc' -type f | head -n 1)"
          test -x "${GLSLC_PATH}"
          VULKAN_SDK_ROOT="$(dirname "$(dirname "${GLSLC_PATH}")")"
          echo "VULKAN_SDK=${VULKAN_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${VULKAN_SDK_ROOT}${CMAKE_PREFIX_PATH:+:${CMAKE_PREFIX_PATH}}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${VULKAN_SDK_ROOT}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "$GITHUB_ENV"
          echo "$(dirname "${GLSLC_PATH}")" >> "$GITHUB_PATH"
          "${GLSLC_PATH}" --version

      - name: <Setup> Install ONNX GGML native build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($null -eq $sdk) {
            throw "Vulkan SDK was not installed under C:\VulkanSDK"
          }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_PREFIX_PATH=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$($sdk.FullName)\Bin\glslc.exe" --version

      - name: <Setup> Prepare ONNX Runtime Plugin EP headers
        run: |
          set -eux
          mkdir -p download/
          ORT_ARCHIVE="onnxruntime-linux-x64-${AIVIS_ONNX_GGML_ORT_VERSION}.tgz"
          ORT_DIR="$PWD/build/onnxruntime-${AIVIS_ONNX_GGML_ORT_VERSION}"
          curl -sSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${AIVIS_ONNX_GGML_ORT_VERSION}/${ORT_ARCHIVE}" \
            -o "download/${ORT_ARCHIVE}"
          mkdir -p "${ORT_DIR}"
          tar -xzf "download/${ORT_ARCHIVE}" -C "${ORT_DIR}" --strip-components=1 --exclude='*/lib/*'
          ORT_HEADER_PATH="$(find "${ORT_DIR}" -name onnxruntime_cxx_api.h -type f | head -n 1)"
          ORT_INCLUDE_DIR="$(dirname "${ORT_HEADER_PATH}")"
          test -f "${ORT_INCLUDE_DIR}/onnxruntime_cxx_api.h"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ORT_INCLUDE_DIR="$(cygpath -w "${ORT_INCLUDE_DIR}")"
          fi
          echo "ORT_INCLUDE_DIR=${ORT_INCLUDE_DIR}" >> "$GITHUB_ENV"

      - name: <Build> Build ONNX GGML Plugin EP
        run: |
          set -eux
          cmake \
            -S experimental/onnxruntime-ep-aivis-ggml/native \
            -B build/onnx-ggml-native \
            -DCMAKE_BUILD_TYPE=Release \
            -DORT_INCLUDE_DIR="$ORT_INCLUDE_DIR"
          cmake --build build/onnx-ggml-native --config Release --parallel
          cmake --install build/onnx-ggml-native --config Release \
            --prefix experimental/onnxruntime-ep-aivis-ggml/src

      - name: <Build> Build TTS.cpp runtime
        run: |
          set -eux
          TTS_CPP_DIR="$PWD/build/TTS.cpp"
          TTS_CPP_BUILD_DIR="$PWD/build/TTS.cpp-build"
          rm -rf "$TTS_CPP_DIR" "$TTS_CPP_BUILD_DIR"
          git clone --recursive "$AIVIS_ONNX_GGML_TTS_CPP_REPOSITORY" "$TTS_CPP_DIR"
          git -C "$TTS_CPP_DIR" checkout "$AIVIS_ONNX_GGML_TTS_CPP_REF"
          git -C "$TTS_CPP_DIR" submodule update --init --recursive

          cmake_args=(
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=ON
            -DTTS_BUILD_EXAMPLES=OFF
            -DCMAKE_BUILD_RPATH_USE_ORIGIN=ON
            "-DCMAKE_BUILD_RPATH=\$ORIGIN"
            "-DCMAKE_INSTALL_RPATH=\$ORIGIN"
          )
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cmake_args+=(-DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON)
          else
            cmake_args+=(-DGGML_VULKAN=ON)
          fi

          cmake -S "$TTS_CPP_DIR" -B "$TTS_CPP_BUILD_DIR" "${cmake_args[@]}"
          cmake --build "$TTS_CPP_BUILD_DIR" --config Release --target tts --parallel

          TTS_CPP_BUILD_DIR_FOR_PYTHON="$TTS_CPP_BUILD_DIR"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            TTS_CPP_BUILD_DIR_FOR_PYTHON="$(cygpath -w "${TTS_CPP_BUILD_DIR}")"
          fi
          TTS_CPP_BUILD_DIR="$TTS_CPP_BUILD_DIR_FOR_PYTHON" python - <<'PY'
          import os
          import sys
          from pathlib import Path

          build_dir = Path(os.environ["TTS_CPP_BUILD_DIR"])
          if sys.platform == "win32":
              tts_patterns = ("tts.dll", "libtts.dll")
              dependency_patterns = ("ggml*.dll", "libggml*.dll")
          elif sys.platform == "darwin":
              tts_patterns = ("libtts.dylib",)
              dependency_patterns = ("libggml*.dylib",)
          else:
              tts_patterns = ("libtts.so", "libtts.so.*")
              dependency_patterns = ("libggml*.so", "libggml*.so.*")

          def collect(patterns):
              results = []
              for pattern in patterns:
                  results.extend(sorted(path for path in build_dir.rglob(pattern) if path.is_file()))
              return results

          tts_libraries = collect(tts_patterns)
          if not tts_libraries:
              raise RuntimeError(f"TTS.cpp library was not found under {build_dir}")

          library_dirs = {str(path.parent) for path in [*tts_libraries, *collect(dependency_patterns)]}
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"AIVIS_TTS_CPP_LIBRARY_PATH={tts_libraries[0]}\n")
              env_file.write(f"AIVIS_TTS_CPP_LIBRARY_DIRS={os.pathsep.join(sorted(library_dirs))}\n")
              env_file.write("AIVIS_ONNX_GGML_REQUIRED=1\n")
          PY

      - name: <Setup> Prepare custom PyInstaller
        if: runner.os == 'Windows'
        run: ./tools/modify_pyinstaller.bash

      - name: <Setup> Create download directory
        run: mkdir -p download/

      # Build
      - name: <Build> Generate licenses.json
        run: |
          OUTPUT_LICENSE_JSON_PATH=resources/engine_manifest_assets/dependency_licenses.json \
          bash tools/create_venv_and_generate_licenses.bash

      - name: <Build> Build AivisSpeech Engine run.py
        run: |
          set -eux

          jq '
            .version = "${{ needs.config.outputs.version_or_latest }}" |
            if ${{ runner.os == 'Windows' }} then .command += ".exe" else . end
          ' engine_manifest.json > engine_manifest.json.tmp

          mv -f engine_manifest.json.tmp engine_manifest.json

          # Replace version & specify dynamic libraries
          $sed -i "s/__version__ = \"latest\"/__version__ = \"${{ needs.config.outputs.version_or_latest }}\"/" voicevox_engine/__init__.py

          uv run pyinstaller --noconfirm run.spec

      - name: <Build> Code signing
        if: github.event.inputs.code_signing == 'true' && runner.os == 'Windows'
        run: bash tools/codesign.bash "dist/run/run.exe"
        env:
          ESIGNERCKA_USERNAME: ${{ secrets.ESIGNERCKA_USERNAME }}
          ESIGNERCKA_PASSWORD: ${{ secrets.ESIGNERCKA_PASSWORD }}
          ESIGNERCKA_TOTP_SECRET: ${{ secrets.ESIGNERCKA_TOTP_SECRET }}

      - name: <Build> Rename artifact directory to archive
        run: mv dist/run/ "${{ matrix.target }}/"

      # 7z archives
      - name: <Build> Create 7z archives
        run: |
          # Compress to artifact.7z.001, artifact.7z.002, ...
          7z -r -v1900m a "${{ steps.vars.outputs.package_name }}.7z" "${{ matrix.target }}/"

          # Output splitted archive list
          ls ${{ steps.vars.outputs.package_name }}.7z.* > archives_7z.txt
          mv archives_7z.txt "${{ steps.vars.outputs.package_name }}.7z.txt"

      - name: <Deploy> Upload 7z archives to artifact
        if: github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.vars.outputs.package_name }}-7z
          path: |
            ${{ steps.vars.outputs.package_name }}.7z.*

      - name: <Deploy> Upload 7z archives to Release assets
        if: needs.config.outputs.version != ''
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          prerelease: ${{ github.event.inputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.config.outputs.version }}
          artifacts: >
            ${{ steps.vars.outputs.package_name }}.7z.*
          commit: ${{ github.sha }}

      - name: <Setup> Clean 7z archives to reduce disk usage
        run: rm -f ${{ steps.vars.outputs.package_name }}.7z.*

      # VVPP archives
      # - name: <Build> Create VVPP archives
      #   run: |
      #     # Compress to compressed.zip.001, compressed.zip.002, ...
      #     # NOTE: 1000th archive will be "compressed.zip.1000" after "compressed.zip.999". This is unconsidered as an extreme case.
      #     (cd "${{ matrix.target }}" && 7z -r -v1900M a "../compressed.zip")

      #     # Rename to artifact.001.vvppp, artifact.002.vvppp, ...
      #     for FILE in compressed.zip.*; do
      #       NUMBER=${FILE##*.} # 001
      #       mv "${FILE}" "${{ steps.vars.outputs.package_name }}.${NUMBER}.vvppp"
      #     done

      #     # Rename to artifact.vvpp if there are only artifact.001.vvppp
      #     if [ "$(find ${{ steps.vars.outputs.package_name }}.*.vvppp -maxdepth 1 | wc -l)" -eq 1 ]; then
      #       mv ${{ steps.vars.outputs.package_name }}.001.vvppp ${{ steps.vars.outputs.package_name }}.vvpp
      #     fi

      #     # Output splitted archive list
      #     ls ${{ steps.vars.outputs.package_name }}*.vvppp ${{ steps.vars.outputs.package_name }}.vvpp > archives_vvpp.txt || true
      #     mv archives_vvpp.txt "${{ steps.vars.outputs.package_name }}.vvpp.txt"

      # - name: <Deploy> Upload VVPP archives to artifact
      #   if: github.event.inputs.upload_artifact == 'true'
      #   uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      #   with:
      #     name: ${{ steps.vars.outputs.package_name }}-vvpp
      #     path: |
      #       ${{ steps.vars.outputs.package_name }}.vvpp
      #       ${{ steps.vars.outputs.package_name }}*.vvppp
      #       ${{ steps.vars.outputs.package_name }}.vvpp.txt

      # - name: <Deploy> Upload VVPP archives to Release assets
      #   if: needs.config.outputs.version != ''
      #   uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      #   with:
      #     allowUpdates: true
      #     prerelease: ${{ github.event.inputs.prerelease }}
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     tag: ${{ needs.config.outputs.version }}
      #     artifacts: >
      #       ${{ steps.vars.outputs.package_name }}.vvpp,
      #       ${{ steps.vars.outputs.package_name }}*.vvppp,
      #       ${{ steps.vars.outputs.package_name }}.vvpp.txt
      #     commit: ${{ github.sha }}

      - name: <Deploy> Merge artifacts
        if: github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact/merge@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.vars.outputs.package_name }}
          pattern: ${{ steps.vars.outputs.package_name }}-*
          delete-merged: true

  update-tag-to-current-commit:
    if: needs.config.outputs.version != ''
    needs: [config, build-and-upload]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: <Setup> Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: <Deploy> Change tag to this commit for refreshing the release # c.f. voicevox_engine#854
        run: |
          git tag -f ${{ needs.config.outputs.version }}
          git push -f --tag

  run-release-test-workflow:
    if: needs.config.outputs.version != ''
    needs: [config, build-and-upload]
    uses: ./.github/workflows/test-engine-package.yml
    with:
      version: ${{ needs.config.outputs.version }}
      repo_url: ${{ format('{0}/{1}', github.server_url, github.repository) }} # このリポジトリのURL

  run-build-latest-engine-container-workflow:
    if: needs.config.outputs.version != ''
    needs: [config, run-release-test-workflow]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-latest-engine-container.yml
    with:
      version: ${{ needs.config.outputs.version }}
